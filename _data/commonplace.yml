# The commonplace book. Newest entry first — the front page shows the top one.
# `source` may contain HTML, e.g. <em>Title</em>.

- quote: "Even life's viewpoints and meaningless proofs, to you, are so laughable that you can't
          even use them to relieve your boredom. The foolish people of that race, acting as if
          they were the rulers of all, have presented childish theorems that reek of their conceitedness.
          We have been shown the freedom to imagine things, such as infinite love and what's beyond the sky."
  source: "Opening to Steins; Gate "


- quote: "If we look carefully, it is by means of its slogan that the Revolution has penetrated
          the Church. Liberty - ... which confers rights on error. Equality - collegiality, and
          the destruction of personal authority, the authority of God, of the Pope, of the Bishops,
          in a word, majority rule. Finally, fraternity - it is represented by Ecumenism ...
          Vatican II is the French Revolution in the Church."
  source: "Archbishop Marcel Lefebvre, Open Letter to Confused Catholics"

- quote: "Beatus vir qui suffert tentationem : quoniam cum probatus fuerit, accipiet coronam vitae, quam repromisit Deus diligentibus se."
  source: "James 1:12"



