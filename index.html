
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: #0a0a0a;
    color: #ececec;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  h1 {
    font-weight: 400;
    font-size: clamp(3rem, 10vw, 5.5rem);
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .sound-btn {
    position: fixed;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: none;
    border: 1px solid #333;
    color: #ececec;
    width: 2.6rem;
    height: 2.6rem;
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.25s ease;
  }

  .sound-btn:hover {
    border-color: #666;
  }

  .sound-btn svg {
    width: 0.95rem;
    height: 0.95rem;
    fill: currentColor;
  }
</style>
</head>
<body>

  <h1>Coming Soon</h1>

  <button class="sound-btn" id="soundToggle" aria-label="Play music">
    <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
  </button>

  <!-- Replace "lilium.mp3" with the path to your audio file -->
  <audio id="bgAudio" loop>
    <source src="lilium.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById('bgAudio');
    const btn = document.getElementById('soundToggle');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');

    btn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
        btn.setAttribute('aria-label', 'Pause music');
      } else {
        audio.pause();
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
        btn.setAttribute('aria-label', 'Play music');
      }
    });
  </script>
</body>
</html>
